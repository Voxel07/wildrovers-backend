#JWT
## Private Key used to sign JWTs for username/password login
smallrye.jwt.sign.key.location=${JWT_PRIVATE_KEY_PATH:privateKey.pem}
# Local JWT verification is handled by LocalJwtAuthMechanism (no mp.jwt.verify.* needed)
#Email
# quarkus.mailer.from=Camo@wildrovers.io
# quarkus.mailer.host=smtp.sendgrid.net
# quarkus.mailer.port=465
# quarkus.mailer.ssl=true
# quarkus.mailer.username=${EMAIL_SEDNGRID_USERNAME}
# quarkus.mailer.password=${EMAIL_SEDNGRID_PASSWORD}
# quarkus.mailer.mock=false
# quarkus.vault.secret-config-kv-path=myapps/myapp/myconfig
quarkus.mailer.auth-methods=${MAILER_AUTH_METHODS}
quarkus.mailer.from=${MAILER_FROM}
quarkus.mailer.host=${MAILER_HOST}
quarkus.mailer.port=${MAILER_PORT}
quarkus.mailer.ssl=${MAILER_SSL}
quarkus.mailer.start-tls=${MAILER_START_TLS}
quarkus.mailer.username=${MAILER_USERNAME}
quarkus.mailer.password=${MAILER_PASSWORD}
quarkus.mailer.mock=${MAILER_MOCK}
#File Upload
quarkus.http.body.handle-file-uploads=true
quarkus.http.limits.max-form-attribute-size=10M
quarkus.http.limits.max-body-size=20M
quarkus.http.body.delete-uploaded-files-on-end=true
# quarkus.http.body.uploads-directory = "/home"
quarkus.application.name=wildrovers
quarkus.application.version=1.0.0-SNAPSHOT
# Forum image storage — files saved here are served via /forum/img endpoint.
# In production: set to a directory OUTSIDE the web root, with no execute permissions.
forum.images.upload-dir=${FORUM_IMAGES_UPLOAD_DIR:${user.home}/wildrovers-uploads/forum}
# User photos storage — files saved here are served via /user/photo endpoint.
user.photos.upload-dir=${USER_PHOTOS_UPLOAD_DIR:${user.home}/wildrovers-uploads/user-photos}
# Enable OpenTelemetry Traces & Metrics
# Set OTEL_DISABLED=true in .env during local dev to silence connection errors
quarkus.otel.sdk.disabled=${OTEL_DISABLED:true}
quarkus.otel.enabled=true
quarkus.otel.metrics.enabled=true
quarkus.otel.service.name=wildrovers-backend
# Set up the protocol & OpenObserve OTLP endpoint
# Use a single base endpoint — Quarkus auto-appends /v1/traces, /v1/metrics, /v1/logs
quarkus.otel.exporter.otlp.protocol=http/protobuf
quarkus.otel.exporter.otlp.traces.protocol=http/protobuf
quarkus.otel.exporter.otlp.metrics.protocol=http/protobuf
quarkus.otel.exporter.otlp.endpoint=${OPENOBSERVE_ENDPOINT:http://localhost:5080/api/default}
# Authentication header (Basic auth base64 of email:password)
quarkus.otel.exporter.otlp.headers=Authorization=Basic ${OPENOBSERVE_TOKEN:YWRtaW5AZXhhbXBsZS5jb206WW91clNlY3VyZVBhc3N3b3JkMTIz}
# Debug logging for OTel exporter — remove once traces are confirmed working
quarkus.log.category."io.quarkus.opentelemetry".level=DEBUG
quarkus.log.category."io.opentelemetry".level=DEBUG
# Ensure traceparent/tracestate context is permitted for distributed trace propagation
# Application Base URL (used for generating verification/reset links)
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
# Caching Configuration
quarkus.cache.caffeine."resolved-users".expire-after-write=5s
quarkus.cache.caffeine."team-members".expire-after-write=5m
# Event Caches
quarkus.cache.caffeine."events".expire-after-write=10m
quarkus.cache.caffeine."upcoming-events".expire-after-write=10m
quarkus.cache.caffeine."events-by-id".expire-after-write=10m
quarkus.cache.caffeine."events-by-post-id".expire-after-write=10m
# Gallery Caches
quarkus.cache.caffeine."galleries".expire-after-write=10m
quarkus.cache.caffeine."galleries-by-id".expire-after-write=10m
# Forum Category Caches
quarkus.cache.caffeine."forum-categories".expire-after-write=10m
quarkus.cache.caffeine."forum-categories-by-name".expire-after-write=10m
quarkus.cache.caffeine."forum-categories-by-id".expire-after-write=10m
quarkus.cache.caffeine."forum-category-count".expire-after-write=10m
# Forum Poll Caches
quarkus.cache.caffeine."poll-has-voted".expire-after-write=10m
quarkus.cache.caffeine."poll-voted-options".expire-after-write=10m

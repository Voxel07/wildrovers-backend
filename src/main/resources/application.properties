quarkus.mailer.auth-methods=DIGEST-MD5 CRAM-SHA256 CRAM-SHA1 CRAM-MD5 PLAIN LOGIN
quarkus.mailer.from=wildrovers.wtf@gmail.com
quarkus.mailer.host=smtp.gmail.com
quarkus.mailer.port=587
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.username=${EMAIL_GOOGLE_USERNAME}
quarkus.mailer.password=${EMAIL_GOOGLE_PASSWORD}
quarkus.mailer.mock=true
#File Upload
quarkus.http.body.handle-file-uploads=true
quarkus.http.limits.max-form-attribute-size=10M
quarkus.http.limits.max-body-size=20M
quarkus.http.body.delete-uploaded-files-on-end=true
# quarkus.http.body.uploads-directory = "/home"
quarkus.application.name=wildrovers
quarkus.application.version=1.0.0-SNAPSHOT
# Forum image storage — files saved here are served via /forum/img endpoint.
# In production: set to a directory OUTSIDE the web root, with no execute permissions.
forum.images.upload-dir=${user.home}/wildrovers-uploads/forum
# User photos storage — files saved here are served via /user/photo endpoint.
user.photos.upload-dir=${user.home}/wildrovers-uploads/user-photos
# Enable OpenTelemetry Traces & Metrics
quarkus.otel.enabled=true
quarkus.otel.metrics.enabled=true
quarkus.otel.service.name=wildrovers-backend
# Set up the protocol & OpenObserve OTLP endpoint
quarkus.otel.exporter.otlp.protocol=http/protobuf
quarkus.otel.exporter.otlp.endpoint=http://localhost:5080/api/default
# Authentication header (Basic auth base64 of email:password)
# E.g., for admin@example.com:YourSecurePassword123 -> Basic YWRtaW5AZXhhbXBsZS5jb206WW91clNlY3VyZVBhc3N3b3JkMTIz
quarkus.otel.exporter.otlp.headers=Authorization=Basic YWRtaW5AZXhhbXBsZS5jb206WW91clNlY3VyZVBhc3N3b3JkMTIz
# Ensure traceparent/tracestate context is permitted for distributed trace propagation

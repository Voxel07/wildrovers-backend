# OIDC Configuration for Authentik (REST API Service)
quarkus.oidc.application-type=service
quarkus.oidc.auth-server-url=${AUTHENTIK_AUTH_SERVER_URL:http://localhost:9000/application/o/wildrovers/}
quarkus.oidc.client-id=${AUTHENTIK_CLIENT_ID:wildrovers-backend}
quarkus.oidc.credentials.secret=${AUTHENTIK_CLIENT_SECRET:secret}
quarkus.oidc.roles.role-claim-path=groups
quarkus.oidc.token.principal-claim=${AUTHENTIK_PRINCIPAL_CLAIM:preferred_username}

# Configuration file
#DB Settings
quarkus.datasource.db-kind=mariadb
quarkus.datasource.username=${SQL_USER}
quarkus.datasource.password=${SQL_PASSOWRD}
quarkus.datasource.jdbc.url=${SQL_URL}
#show sql statements
#quarkus.hibernate-orm.log.sql = true
# quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.hibernate-orm.schema-management.strategy=update
#Allow live realoding without restarting Quarkus
quarkus.live-reload.instrumentation=true
#Frontendgedöns
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:5173}
quarkus.http.cors.headers=accept, origin, authorization, content-type, x-requested-with, traceparent, tracestate
quarkus.http.cors.methods=GET,PUT,POST,DELETE,OPTIONS
quarkus.http.proxy.proxy-address-forwarding=true
#Logging
quarkus.log.file.enabled=true
quarkus.log.file.path=/tmp/trace.log
quarkus.log.file.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n

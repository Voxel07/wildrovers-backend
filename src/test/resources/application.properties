# ── Test profile configuration ──────────────────────────────────────────
# H2 in-memory — no MODE=MariaDB to avoid DDL incompatibilities.
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=USER
quarkus.datasource.username=sa
quarkus.datasource.password=

# Schema: drop-and-create each run
quarkus.hibernate-orm.database.generation=drop-and-create

# Disable features not needed for tests
quarkus.mailer.mock=true
quarkus.otel.sdk.disabled=true
quarkus.live-reload.instrumentation=false
quarkus.oidc.enabled=false

# File uploads to temp
forum.images.upload-dir=${java.io.tmpdir}/wildrovers-test/forum
user.photos.upload-dir=${java.io.tmpdir}/wildrovers-test/user-photos

# JWT key
smallrye.jwt.sign.key.location=/publicKey.jwks

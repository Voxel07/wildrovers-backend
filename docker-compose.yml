services:
  backend:
    image: ghcr.io/voxel07/wildrovers-backend:latest
    container_name: wildrovers-backend
    restart: unless-stopped
    # Ports can be omitted if you only expose them via the Nginx proxy network,
    # but kept here if you need direct access for testing.
    ports:
      - "8080:8080"
    networks:
      - mariadb_network
      - proxy_network
    environment:
      # Use the hostname of your external MariaDB container here (e.g. wildrovers-db-external)
      SQL_URL: "jdbc:mariadb://<YOUR_EXTERNAL_DB_CONTAINER_NAME>:3306/wildrovers"
      SQL_USER: "${SQL_USER}"
      SQL_PASSOWRD: "${SQL_PASSOWRD}"
      AUTHENTIK_AUTH_SERVER_URL: "${AUTHENTIK_AUTH_SERVER_URL}"
      AUTHENTIK_CLIENT_ID: "${AUTHENTIK_CLIENT_ID}"
      AUTHENTIK_CLIENT_SECRET: "${AUTHENTIK_CLIENT_SECRET}"
      GOOGLE_CALENDAR_CREDENTIALS: "/work/service_account.json"
      GOOGLE_CALENDAR_ID: "${GOOGLE_CALENDAR_ID}"
      FORUM_IMAGES_UPLOAD_DIR: "/work/uploads/forum"
      USER_PHOTOS_UPLOAD_DIR: "/work/uploads/user-photos"
      # The public URL of the frontend browser client (CORS configuration)
      CORS_ORIGINS: "https://your-domain.de" # Replace with your production domain
      OPENOBSERVE_ENDPOINT: "${OPENOBSERVE_ENDPOINT:-http://openobserve:5080/api/default}"
      OPENOBSERVE_TOKEN: "${OPENOBSERVE_TOKEN}"
      MAILER_MOCK: "${MAILER_MOCK:-true}"
      MAILER_FROM: "${MAILER_FROM}"
      MAILER_HOST: "${MAILER_HOST}"
      MAILER_PORT: "${MAILER_PORT}"
      MAILER_SSL: "${MAILER_SSL}"
      MAILER_START_TLS: "${MAILER_START_TLS}"
      MAILER_USERNAME: "${MAILER_USERNAME}"
      MAILER_PASSWORD: "${MAILER_PASSWORD}"
      MAILER_AUTH_METHODS: "${MAILER_AUTH_METHODS}"
      APP_BASE_URL: "${APP_BASE_URL:-http://localhost:8080}"
      EMAIL_GOOGLE_USERNAME: "${EMAIL_GOOGLE_USERNAME}"
      EMAIL_GOOGLE_PASSWORD: "${EMAIL_GOOGLE_PASSWORD}"
      # JWT key paths (override in .env for custom locations)
      JWT_PRIVATE_KEY_PATH: "/work/keys/privateKey.pem"
      JWT_PUBLIC_KEY_PATH: "/work/keys/publicKey.pem"
    volumes:
      - backend_uploads:/work/uploads
      - ./service_account.json:/work/service_account.json:ro
      # Mount JWT key files directory (read-write to allow generation/rotation)
      - ${JWT_KEYS_DIR:-./src/main/resources}:/work/keys

  frontend:
    image: ghcr.io/voxel07/wildrovers-frontend:latest
    container_name: wildrovers-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - proxy_network
    environment:
      # The public URL of the backend API as seen by the user's browser
      VITE_API_URL: "https://api.wildrovers.wtf" # Or "https://wildrovers.wtf/api" depending on Nginx routing
      VITE_OIDC_AUTHORITY: "${VITE_OIDC_AUTHORITY}"
      VITE_OIDC_CLIENT_ID: "${VITE_OIDC_CLIENT_ID}"
      VITE_OIDC_REDIRECT_URI: "${VITE_OIDC_REDIRECT_URI}"
      VITE_IMMICH_PROXY_URL: "${VITE_IMMICH_PROXY_URL}"
      VITE_IMMICH_DROP_URL: "${VITE_IMMICH_DROP_URL}"
      VITE_IMMICH_KIOSK_URL: "${VITE_IMMICH_KIOSK_URL}"
      VITE_OPENOBSERVE_SITE: "${VITE_OPENOBSERVE_SITE}"
      VITE_OPENOBSERVE_RUM_KEY: "${VITE_OPENOBSERVE_RUM_KEY}"
      VITE_OPENOBSERVE_APP_ID: "${VITE_OPENOBSERVE_APP_ID}"
      VITE_OPENOBSERVE_ORG: "${VITE_OPENOBSERVE_ORG}"
      VITE_OPENOBSERVE_INSECURE_HTTP: "${VITE_OPENOBSERVE_INSECURE_HTTP}"

  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:v0.90.3
    container_name: openobserve
    restart: unless-stopped
    ports:
      - "5080:5080"
    environment:
      - ZO_ROOT_USER_EMAIL=admin@example.com
      - ZO_ROOT_USER_PASSWORD=YourSecurePassword123
      - ZO_RUM_ENABLED=true
      - ZO_RUM_CLIENT_TOKEN=iwY3aGIUpzCNn3Sv
    volumes:
      - openobserve_data:/data
    networks:
      - proxy_network

volumes:
  backend_uploads:
  openobserve_data:

networks:
  mariadb_network:
    external: true
    name: my_mariadb_network
  proxy_network:
    external: true
    name: my_proxy_network

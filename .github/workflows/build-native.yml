name: Build JVM Image and Publish to GHCR

on:
  push:
    tags:
      - '*'

jobs:
  build-and-push:
    name: Build JVM Application & Docker Container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Tag is on master Branch
        id: check-branch
        run: |
          git fetch origin master --depth=1 || git fetch origin master
          # Check if the commit pointed to by the tag is on origin/master
          if git branch -r --contains ${{ github.sha }} | grep -q 'origin/master'; then
            echo "on_master=true" >> $GITHUB_OUTPUT
            echo "Tag is on the master branch. Proceeding with build."
          else
            echo "on_master=false" >> $GITHUB_OUTPUT
            echo "Tag is NOT on the master branch. Skipping build."
          fi

      - name: Lowercase Repository Details
        if: steps.check-branch.outputs.on_master == 'true'
        id: repo_details
        run: |
          echo "owner=${OWNER,,}" >> $GITHUB_OUTPUT
          echo "repo=${REPO,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: '${{ github.repository_owner }}'
          REPO: '${{ github.event.repository.name }}'

      - name: Extract Tag Name
        if: steps.check-branch.outputs.on_master == 'true'
        id: get_tag
        run: |
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set up Java JDK
        if: steps.check-branch.outputs.on_master == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make Maven Wrapper Executable
        if: steps.check-branch.outputs.on_master == 'true'
        run: chmod +x mvnw

      - name: Build JVM Application with Maven
        if: steps.check-branch.outputs.on_master == 'true'
        run: |
          ./mvnw package -DskipTests

      - name: Log in to GHCR
        if: steps.check-branch.outputs.on_master == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.check-branch.outputs.on_master == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        if: steps.check-branch.outputs.on_master == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/main/docker/Dockerfile.jvm
          push: true
          tags: |
            ghcr.io/${{ steps.repo_details.outputs.owner }}/${{ steps.repo_details.outputs.repo }}:${{ steps.get_tag.outputs.tag }}
            ghcr.io/${{ steps.repo_details.outputs.owner }}/${{ steps.repo_details.outputs.repo }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
